name: Build Go Exam APK

on:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Install Build Tools
      run: |

        sudo apt update

        sudo apt install -y \
        build-essential \
        git \
        zip \
        unzip \
        openjdk-17-jdk


    - name: Install Buildozer
      run: |

        pip install buildozer


    - name: Build APK
      working-directory: mobile
      run: |

        buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:

        name: Go-Exam-apk

        path: mobile/bin/*.apk
